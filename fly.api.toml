app = "sentinel-api"
primary_region = "sin"  # Singapore — close to India

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

# Set secrets with: fly secrets set DATABASE_URL=... REDIS_URL=... PLANET_API_KEY=... SECRET_KEY=...
# Optional: GROQ_API_KEY SENDGRID_API_KEY SLACK_WEBHOOK_URL SENTINEL_HUB_CLIENT_ID SENTINEL_HUB_CLIENT_SECRET

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  # No persistent mounts needed for API — DB is external (Supabase/Neon)
