name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check apps/api/ apps/worker/ ml/ scripts/ --ignore E501

  test:
    name: Pytest
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite://"
      REDIS_URL: "redis://localhost:6379/0"
      SENTINEL_HUB_CLIENT_ID: "test"
      SENTINEL_HUB_CLIENT_SECRET: "test"
      GROQ_API_KEY: "test"
      SENDGRID_API_KEY: "test"
      SLACK_WEBHOOK_URL: "https://hooks.slack.com/test"
      SECRET_KEY: "test-secret"
      PLANET_API_KEY: "test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install \
            fastapi uvicorn "sqlalchemy>=2.0" geoalchemy2 psycopg2-binary \
            alembic python-dotenv httpx "pydantic>=2" \
            "celery[redis]" redis \
            numpy scikit-image pillow shapely \
            pytest pytest-asyncio
      - name: Run tests
        run: PYTHONPATH=. pytest apps/api/tests/ -v --tb=short

  frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install
        working-directory: apps/web
      - run: npm run type-check
        working-directory: apps/web
